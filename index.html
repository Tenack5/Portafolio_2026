<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Digital Ivan Pereyra</title>
<link rel="stylesheet" href="style.css">
</head>


<body>
  <nav class="navbar">
    <div class="container nav-container">
      <div class="nav-logo">
          <img src="img/cow.gif" height="50px" alt="">
      </div>
      <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#about">Sobre mi</a>
        <a href="#projects">Projectos</a>
        <a href="#contact">Contacto</a>
      </div>
    </div>
  </nav>
  <header id="home" class="header">
    <div class="container">
      <h1 class="header-nomb">Ivan Pereyra</h1>
      
      <h3 class="header-role">
        <span id="role-text">Desarrollador Front End</span>
      </h3>
    </div>
  </header>
  <section id="about">
    <div class="container">

      <h2 class="section-title">Sobre mi</h2>

      <div class="about-box">

        <div class="about-content">
          <div class="about-img">
            <img src="img/rkon.png" alt="Profile photo">
          </div>

          <div class="about-text">
            <h3>¡Hey!</h3>
            <p>
              Mi nombre es Ivan Pereyra, soy un Desarrollador Front End, Diseñador de UI/UX, Programador Web y Freelancer con base en Argentina
            </p>
          </div>
        </div>

        <div class="skills-box">
          <h3>Habilidades</h3>

          <div class="skills-grid">
            <div class="skill">HTML</div>
            <div class="skill">CSS</div>
            <div class="skill">JavaScript</div>
            <div class="skill">Python</div>
            <div class="skill">Git</div>
            <div class="skill">SQL</div>
          </div>
        </div>

      </div>
    </div>
  </section>




<script>
  const roles = [
    "Desarrollador Front End",
    "Diseñador UI/UX",
    "Programador Web",
    "Freelancer"
  ];

  let index = 0;
  const roleText = document.getElementById("role-text");

  function changeRole() {
    roleText.classList.remove("fade-in");
    roleText.classList.add("fade-out");

    setTimeout(() => {
      index = (index + 1) % roles.length;
      roleText.textContent = roles[index];

      roleText.classList.remove("fade-out");
      roleText.classList.add("fade-in");
    }, 500);
  }

  setInterval(changeRole, 2500);
</script>

</body>
